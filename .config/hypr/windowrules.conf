
# в–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Ҳв–‘в–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–‘в–‘вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

# See https://wiki.hyprland.org/Configuring/Window-Rules/

# '$&' is a hyde specific shorthand for "override" \\ analogous to a reference
# This symbol indicates that the following values will override the default configuration
$&=override

# idleinhibit rules
windowrule = idle_inhibit fullscreen, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

# Picture-in-Picture
windowrule = tag +picture-in-picture, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = float on, keep_aspect_ratio on, move ((monitor_w*0.73)) ((monitor_h*0.72)), size (monitor_w*0.25), pin on, match:tag picture-in-picture

windowrule = opacity 0.90 $& 0.90 $& 1, match:class ^(firefox)$
windowrule = opacity 0.90 $& 0.90 $& 1, match:class ^(brave-browser)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(code-oss)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^([Cc]ode)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(code-url-handler)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(code-insiders-url-handler)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(kitty)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(org.kde.dolphin)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(org.kde.ark)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(nwg-look)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(qt5ct)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(qt6ct)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(kvantummanager)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(blueman-manager)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(nm-applet)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(nm-connection-editor)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(polkit-gnome-authentication-agent-1)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(org.freedesktop.impl.portal.desktop.gtk)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(org.freedesktop.impl.portal.desktop.hyprland)$
windowrule = opacity 0.70 $& 0.70 $& 1, match:class ^([Ss]team)$
windowrule = opacity 0.70 $& 0.70 $& 1, match:class ^(steamwebhelper)$
windowrule = opacity 0.70 $& 0.70 $& 1, match:class ^([Ss]potify)$
windowrule = opacity 0.70 $& 0.70 $& 1, match:initial_title ^(Spotify Free)$
windowrule = opacity 0.70 $& 0.70 $& 1, match:initial_title ^(Spotify Premium)$

windowrule = opacity 0.90 0.90, float on, match:class ^(com.github.rafostar.Clapper)$ # Clapper-Gtk
windowrule = opacity 0.80 0.80, match:class ^(com.github.tchx84.Flatseal)$ # Flatseal-Gtk
windowrule = opacity 0.80 0.80, match:class ^(hu.kramo.Cartridges)$ # Cartridges-Gtk
windowrule = opacity 0.80 0.80, match:class ^(com.obsproject.Studio)$ # Obs-Qt
windowrule = opacity 0.80 0.80, match:class ^(gnome-boxes)$ # Boxes-Gtk
windowrule = opacity 0.80 0.80, match:class ^(vesktop)$ # Vesktop
windowrule = opacity 0.80 0.80, match:class ^(discord)$ # Discord-Electron
windowrule = opacity 0.80 0.80, match:class ^(WebCord)$ # WebCord-Electron
windowrule = opacity 0.80 0.80, match:class ^(ArmCord)$ # ArmCord-Electron
windowrule = opacity 0.80 0.80, float on, match:class ^(app.drey.Warp)$ # Warp-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(net.davidotek.pupgui2)$ # ProtonUp-Qt
windowrule = opacity 0.80 0.80, float on, match:class ^(yad)$ # Protontricks-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(Signal)$ # Signal-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(io.github.alainm23.planify)$ # planify-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(io.gitlab.theevilskeleton.Upscaler)$ # Upscaler-Gtk
windowrule = opacity 0.80 0.80, match:class ^(com.github.unrud.VideoDownloader)$ # VideoDownloader-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(io.gitlab.adhami3310.Impression)$ # Impression-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(io.missioncenter.MissionCenter)$ # MissionCenter-Gtk
windowrule = opacity 0.80 0.80, match:class ^(io.github.flattool.Warehouse)$ # Warehouse-Gtk

windowrule = float on, match:class ^(eog)$ # Imageviewer-Gtk
windowrule = float on, match:class ^(com.github.unrud.VideoDownloader)$ # VideoDownloader-Gkk

# workaround for jetbrains IDEs dropdowns/popups cause flickering
windowrule = no_initial_focus on, match:class ^(.*jetbrains.*)$, match:title ^(win[0-9]+)$

# в–Ҳв–‘в–‘вҖғв–„в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–‘в–‘вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–„в–„вҖғв–Ҳв–Җв–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

layerrule = blur on, ignore_alpha 0, match:namespace rofi
layerrule = blur on, ignore_alpha 0, match:namespace notifications
layerrule = blur on, ignore_alpha 0, match:namespace swaync-notification-window
layerrule = blur on, ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur on, match:namespace logout_dialog


windowrulev2 = opacity 0.95 0.9,class:.*kitty.*
windowrulev2 = opacity 0.80 0.70,title:.*Lutris.*
windowrulev2 = float,class:^(protonvpn-app)$
windowrulev2 = float,class:^(blender)$
windowrulev2 = float, pin, size 600 500, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(mpv)$
# # Smart gaps from hyperland docs
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]
## GODOT WINDOWS 
# Float all Godot windows EXCEPT the main editor
windowrulev2 = size 1000 800,center,class:^(org.godotengine.Editor)$,floating:1,initialTitle:.*Settings.*
windowrulev2 = size 1000 800,center,class:^(org.godotengine.Editor)$,floating:1,initialTitle:.*Node.*
windowrulev2 = size 1000 800,center,class:^(org.godotengine.Editor)$,floating:1,initialTitle:.*New.*
windowrulev2 = size 1000 800,center,class:^(org.godotengine.Editor)$,floating:1,initialTitle:.*Save.*
windowrulev2 = size 1000 800,center,class:^(org.godotengine.Editor)$,floating:1,initialTitle:.*Choose.*
windowrulev2 = size 530 350,center,class:^(org.godotengine.Editor)$,floating:1,initialTitle:.*Attach Node Script.*
windowrulev2 = size 400 500,center,class:^(org.godotengine.Editor)$,initialTitle:negative:^(?!(Godot)).*,title:negative:.*Settings.*
